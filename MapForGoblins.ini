[Goblin]
; Delay in seconds before loading map icons (wait for game initialization)
load_delay = 5

; Require map fragment discovery before showing icons in that area
require_map_fragments = true

; Enable verbose debug logging (memory addresses, param details, FMG internals)
debug_logging = false


[Equipment]
; Weapons, shields, bows, staves, etc.
show_armaments = false
; Armor pieces (helms, chest, gauntlets, legs)
show_armour = false
; Ashes of War (weapon skills)
show_ashes_of_war = false
; Spirit Ashes (summons)
show_spirits = false
; Talismans
show_talismans = false


[Key Items]
; Celestial Dew (for reversing Spirit Ashes upgrades)
show_celestial_dew = false
; Cookbooks (crafting recipes)
show_cookbooks = false
; Crystal Tears (for Flask of Wondrous Physick)
show_crystal_tears = false
; Great Runes (dropped by story bosses)
show_great_runes = false
; Imbued Sword Keys (Four Belfries)
show_imbued_sword_keys = false
; Larval Tears (respec items)
show_larval_tears = false
; Lost Ashes of War
show_lost_ashes = false
; Cracked Pots, Ritual Pots, Perfume Bottles
show_pots_n_perfumes = false
; Scadutree Fragments (DLC blessing upgrade)
show_scadutree_fragments = false
; Golden Seeds, Sacred Tears, Revered Spirit Ashes
show_seeds_tears = false
; Whetblades (weapon infusion types)
show_whetblades = false


[Loot]
; Arrows, bolts, greatarrows, greatbolts
show_ammo = false
; Bell Bearings from treasures/chests/quest rewards
show_bell_bearings = false
; Bell Bearings dropped by KILLING merchants (Kalé, Patches, Gostoc, nomadic
; merchants, etc.) — off by default; this is a kill-the-merchant reward
show_merchant_bell_bearings = false
; Healing/buff consumables (boluses, cured meats, livers)
show_consumables = false
; Weapon greases
show_greases = false
; Utility items (rainbow stone, glowstone, soap, soft cotton)
show_utilities = false
; Stat-up items (Starlight Shards, Sacrificial Twig, Blessing of Marika)
show_stat_boosts = false
; Crafting materials (flowers, bones, bugs, etc.)
show_crafting_materials = false
; Gloveworts (Grave/Ghost [1-9]) — Spirit Ash upgrade materials
show_gloveworts = false
; Golden Runes [4000+], Hero's/Numen's/Lord's/Shadow Realm Runes
show_golden_runes = false
; Golden Runes [200-3000], Broken Runes (disabled by default — many icons)
show_golden_runes_low = false

; Great Gloveworts (Great Grave, Great Ghost) — rare boss drops
show_great_gloveworts = false
; One-time gathering nodes (Erdleaf Flower, Trina's Lily, etc.)
show_material_nodes = false
; Multiplayer items (Furlcalling/Wizened Fingers, Recusant/Bloody Finger)
show_mp_fingers = false
; Prattling Pates
show_prattling_pates = false
; Rada Fruit (ERR DLC stat-up consumable)
show_rada_fruit = false
; Gestures (auto-discovered via gesture template 90005570 — covers 7/9 spawns)
show_gestures = false
; Reusable tools (Mimic Veil, Margit's Shackle, etc.)
show_reusables = false
; Smithing Stones [7-8], Somber [7-9], Scadushards
show_smithing_stones = false
; Smithing Stones [1-6], Somber [1-6] (disabled by default — many icons)
show_smithing_stones_low = false

; Ancient Dragon Smithing Stones (rare, endgame)
show_smithing_stones_rare = false
; Stonesword Keys
show_stonesword_keys = false
; Throwable items (darts, daggers, stones, chakrams, warming stones)
show_throwables = false
; Rune Arcs (buffs for active Great Rune)
show_rune_arcs = false
; Dragon Hearts (for Dragon Communion incantations)
show_dragon_hearts = false


[Magic]
; Incantation locations
show_incantations = false
; Memory Stone locations (extra spell slots)
show_memory_stones = false
; Prayerbooks and Scrolls (unlock spells at vendors)
show_prayerbooks = false
; Sorcery locations
show_sorceries = false


[Quest]
; Deathroot locations (for Gurranq)
show_deathroot = false
; Quest progression items (medallions, keys, Needles, quest-specific goods)
show_progression = false
; Seedbed Curse locations (for Dung Eater quest)
show_seedbed_curses = false


[Reforged]
; ERR Ember Piece locations
show_ember_pieces = true
; ERR-added items: Oracle Effigy/Remedy, Starlight Tokens, Sealed Curios
show_items_and_changes = false
; ERR Fortune trinkets (12 types)
show_fortunes = false
; ERR Rune Piece locations
show_rune_pieces = true


[World]
; Boss markers (field bosses, dungeon bosses)
show_bosses = false
; Sites of Grace
show_graces = false
; Hostile NPC invader spawn locations (auto-discovered via teamType 24/27)
show_hostile_npc = false
; Imp Statue (Stonesword Key fog gate) locations
show_imp_statues = false
; Painting locations
show_paintings = false
; Spirit Spring (horse jump) locations
show_spirit_springs = false
; Spiritspring Hawk locations
show_spiritspring_hawks = false
; Stakes of Marika (respawn points)
show_stakes_of_marika = false
; Summoning Pool (Martyr Effigy) locations
show_summoning_pools = false
; ERR Kindling Spirits in Misty Forest (m60_45_37_00) — collect all 5
; between rests for the Kindling Spirit incantation. Markers hide
; permanently once the incantation is acquired (engine flag 1045377500),
; and individually within a run via SFX-region runtime state when the
; SFX-walker lands.
show_kindling_spirits = true
; Interactive world objects & puzzles. Includes:
;   - Blue seal puzzles (~65 seals across the overworld, unlock hidden cellars)
;   - "Light flame" interacts: Sellia chalices (3), Snow Town seal-release
;     statues (4), Siofra River lanterns (~14)
;   - Hero's Tomb direction statues (16 across the overworld, summon an
;     arrow SFX pointing at a hidden Hero's Tomb cave entrance)
; Each marker hides on activation via its own engine flag.
show_interactables = false
; World Map fragment locations
show_world_maps = false
; Hide boss markers after defeat (false = show green checkmark instead)
hide_killed_bosses = false


[ERR Markers]
;
; This section patches ERR's OWN pre-placed map markers (camps, merchants,
; bosses, dungeon entrances) — NOT the icons our mod injects. ERR ships
; these markers in WorldMapPointParam, but with broken visibility flags:
; they tend to appear before you discover the corresponding map fragment,
; or fail to hide after the boss/dungeon is cleared.
;
; Our mod's own boss markers are controlled by [World] show_bosses and 
; are independent of this section.

; Rewrite ERR-placed overworld field-boss markers (textId2=5100) to use
; our map-fragment discovery flag. Combine with redify_boss_icons below
; to also recolour them and auto-hide on kill.
patch_overworld_boss_icons = true

; Rewrite ERR-placed dungeon/cave entrance markers (textId3=5100/5300)
; to use our map-fragment discovery flag. Required for redify_dungeon_icons
; and hide_dungeon_icons_on_clear to take effect.
patch_dungeon_boss_icons = true

; Rewrite ERR-placed enemy camp markers (textId2=5000) to use our
; map-fragment discovery flag.
patch_camp_icons = true

; Rewrite ERR-placed merchant markers (textId4=8800) to use our
; map-fragment discovery flag.
patch_merchant_icons = true

; Cosmetic: when patching overworld bosses, also recolour the iconId to
; 374 (red icon) AND auto-hide the marker once the boss is defeated.
; Field bosses only (dragons, golems, etc.) — dungeon/cave entrances are
; controlled by the two toggles below. Requires patch_overworld_boss_icons.
redify_boss_icons = false

; Cosmetic: when patching dungeon entrances, recolour the iconId to 374.
; In ERR the entrance icon doubles as the indicator for the boss inside
; the dungeon. Off by default so caves keep their cave look.
; Requires patch_dungeon_boss_icons.
redify_dungeon_icons = false

; When patching dungeon entrances, hide the marker once the boss inside
; is defeated. Independent from redify_dungeon_icons — useful if you want
; cleared dungeons to disappear so it's easier to spot uncleared ones.
; Requires patch_dungeon_boss_icons.
hide_dungeon_icons_on_clear = false

[Debug]
;
; Hotkey-triggered dump of in-memory map markers (beacons + stamps).
; When enabled, pressing marker_dump_key writes decoded markers to
; logs/MapForGoblins_markers.log alongside the main log.

; Master switch
enable_marker_dump = false
; Key to trigger dump. Supports F1-F24, A-Z, 0-9, Space, Escape, Tab,
; Enter, Backspace, Home, End, PageUp, PageDown, Insert, Delete,
; Up, Down, Left, Right. Default: F9.
marker_dump_key = F9

;
; Injection toggle hotkey (workaround for hosting Seamless Co-op sessions).
; When the mod's expanded WorldMapPointParam + PlaceName FMG are active,
; hosting a co-op session crashes. Press the toggle once to revert both
; tables to vanilla before hosting; press again after the session to
; re-apply the expanded data and get the icons back.
enable_toggle_hotkey = true
; Keyboard key (same names as marker_dump_key). Default: F10.
toggle_injection_key = F10
; Gamepad combo. Tokens joined with '+'. Supported tokens:
;   A, B, X, Y, LB, RB, L3/LSTICK, R3/RSTICK, BACK/SELECT/VIEW,
;   START/MENU, UP/DOWN/LEFT/RIGHT (or DPAD_*). All tokens must be held
;   together. Default: Y + R3 (uncommon during normal play).
toggle_gamepad_combo = Y+R3
; The F10 / gamepad toggle is a personal show/hide for the icons. Icons are
; EXPANDED everywhere by default; hosting Seamless Co-op no longer crashes
; (fixed by 16-aligning the injected param's row-locator table — see
; docs/ersc_hosting_and_map_autohide.md). The old map-state auto-hide is gone.
